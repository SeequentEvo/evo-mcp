services:
  evo-mcp-http:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      # Containered MCP should use HTTP transport, and bind to all interfaces to be accessible from the host
      MCP_TRANSPORT: http
      # MCP container can only run on delegated auth mode
      CLIENT_DELEGATED_AUTH: true
      # Container internal process need run on 0.0.0.0 to be accessible from the host
      MCP_HTTP_HOST: 0.0.0.0
      MCP_HTTP_PORT: ${MCP_HTTP_PORT:-5000}
      # Note: This address should be registered as the redirect URI in your OAuth provider configuration, e.g., http://localhost:5001/signin-callback
      MCP_PUBLIC_BASE_URL: ${MCP_PUBLIC_BASE_URL:-http://localhost:5001}
      EVO_LOCAL_DATA_DIR: /data
    ports:
    # The bound host port should be the same as where MCP_PUBLIC_BASE_URL points to, e.g., if MCP_PUBLIC_BASE_URL is http://127.0.0.1:4321, then this should be "127.0.0.1:4321:${MCP_HTTP_PORT:-5000}"
    # Note: port 5000 is reserved by some operating systems (e.g. OSX) for system services, so we recommend using a different port for the host side, e.g., 5001
      - "localhost:5001:${MCP_HTTP_PORT:-5000}" 
    volumes:
      - ./data:/data
      - evo_mcp_cache:/home/evo-mcp/.local/share/evo-mcp/cache
      # Optional: persist debug logs across container restarts
      # - evo_mcp_logs:/home/evo-mcp/.local/share/evo-mcp/logs

volumes:
  evo_mcp_cache:
  # Optional: enable if you want logs persisted
  # evo_mcp_logs:
