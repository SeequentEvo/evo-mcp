services:
  evo-mcp-http:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      # In containers, run MCP over HTTP and bind to all interfaces.
      MCP_TRANSPORT: http
      MCP_HTTP_HOST: 0.0.0.0
      MCP_HTTP_PORT: ${MCP_HTTP_PORT:-5000}
      
      # Managed auth will not work in a container. Use delegated auth instead.
      CLIENT_DELEGATED_AUTH: true
      

      # Public URL clients use to reach MCP.
      # Register redirect URI:
      #   {MCP_PUBLIC_BASE_URL}{OIDCPROXY_REDIRECT_PATH}
      # (default path: /signin-callback)
      MCP_PUBLIC_BASE_URL: ${MCP_PUBLIC_BASE_URL:-http://localhost:5001}
      EVO_LOCAL_DATA_DIR: /data
    ports:
      # Host port should match the port to which MCP_PUBLIC_BASE_URL will be mapped (e.g. HTTP:80, HTTPS:443, local: custom).
      - "127.0.0.1:5001:${MCP_HTTP_PORT:-5000}" 
    volumes:
      - ./data:/data
      - evo_mcp_cache:/home/evo-mcp/.local/share/evo-mcp/cache
      # Optional: persist debug logs across container restarts
      # - evo_mcp_logs:/home/evo-mcp/.local/share/evo-mcp/logs

volumes:
  evo_mcp_cache:
  # Optional: enable if you want logs persisted
  # evo_mcp_logs:
