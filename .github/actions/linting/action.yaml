name: "Linting"
description: "Run Ruff and SPDX header checks for the Evo MCP project"

runs:
  using: "composite"
  steps:
    - uses: ./.github/actions/install-uv

    - name: Run Ruff check
      shell: bash
      run: uv run --extra dev ruff check

    - name: Run Ruff format check
      shell: bash
      run: uv run --extra dev ruff format --check

    - name: Check Python license headers
      shell: bash
      run: uv run python scripts/check_python_license_headers.py
